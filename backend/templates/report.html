<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; padding: 20px; color: #333; }
        h1 { color: #1a1a2e; border-bottom: 2px solid #e94560; padding-bottom: 10px; }
        .section { margin: 20px 0; }
        .section h2 { color: #16213e; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <p>报告日期：{{ date }}</p>

    <div class="section">
        <h2>一、大盘概况</h2>
        {{ market_overview | safe }}
    </div>

    <div class="section">
        <h2>二、板块表现</h2>
        {{ sector_performance | safe }}
    </div>

    <div class="section">
        <h2>三、持仓变动</h2>
        {{ portfolio_changes | safe }}
    </div>
</body>
</html>
